# Production stack — pulls pre-built images from Docker Hub.
# Driven by the deploy step of the CI/CD workflows (.github/workflows/dev-cd.yml
# for the `dev` branch, prod-cd.yml for `main`), which writes the .env file from
# repository secrets before each rollout.
#
# Manual usage on the VM (e.g. for inspection):
#   cd /opt/tracker
#   docker compose -f docker-compose.prod.yml --env-file .env pull
#   docker compose -f docker-compose.prod.yml --env-file .env up -d
#
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
    # Bind to 127.0.0.1 of the VM, NOT 0.0.0.0 — so an SSH tunnel from your
    # laptop (DBeaver, psql etc.) can reach it, but it's never exposed to the
    # LAN. App services reach postgres via the docker network, not this port.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # S3-compatible object storage for task attachments. Internal only — reached
  # by the backend over the docker network; never published to the host/LAN.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY must be set}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY must be set}
    volumes:
      - minio_data:/data
    healthcheck:
      # `mc ready local` is MinIO's documented liveness probe (the image
      # bundles mc with a built-in alias for its own endpoint).
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    # IMAGE_TAG must be an immutable tag (sha-abc1234), never "latest" — the deploy
    # workflow always passes a concrete sha. Failing here is loud and intentional.
    image: ${DOCKERHUB_USERNAME:?DOCKERHUB_USERNAME must be set}/tracker-backend:${IMAGE_TAG:?IMAGE_TAG must be set to a concrete tag}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS must be set in .env}
      # connection_limit sizes the Prisma pool. Prisma's implicit default is
      # cpu*2+1 (= 5 on a 2-core VM, which the admin "Server sessions" graph caps
      # at); set it explicitly so it can be tuned independently of core count.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public&connection_limit=${DB_CONNECTION_LIMIT:-10}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET must be set}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      THROTTLE_TTL: ${THROTTLE_TTL:-60}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-120}
      # Stricter per-IP throttle for auth routes (login/register/refresh).
      # Defaults to 10/60s; raise only in a load-test environment.
      THROTTLE_AUTH_TTL: ${THROTTLE_AUTH_TTL:-60}
      THROTTLE_AUTH_LIMIT: ${THROTTLE_AUTH_LIMIT:-10}
      # Only consumed by `npm run prisma:seed` when invoked manually via
      # `docker compose exec backend …`. The running app never reads them.
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      SEED_TEST_PASSWORD: ${SEED_TEST_PASSWORD:-}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-tracker-attachments}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY must be set}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY must be set}
      S3_FORCE_PATH_STYLE: "true"
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-26214400}
      # Read-only view of the host backup job's status file, surfaced on
      # /admin/metrics. The file is written by the restic job on the host
      # (see BACKUPS.md); the app only reads it and it carries no secrets.
      BACKUP_STATUS_FILE: /backup-status.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      # status.json must exist before first `up` (the setup step touches it);
      # mounted read-only so a compromised app can't tamper with backup state.
      - ./backups/status.json:/backup-status.json:ro
    expose:
      - "3000"

  frontend:
    image: ${DOCKERHUB_USERNAME}/tracker-frontend:${IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      - backend
    # The image is nginx-unprivileged (non-root), which listens on 8080.
    expose:
      - "8080"

  edge:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./deploy/edge.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      # Hits the edge's own /edge-healthz (answered by nginx directly, no
      # upstream involved) so a crashed/wedged proxy is restarted by Docker.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/edge-healthz"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
  minio_data:

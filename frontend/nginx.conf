# Served by nginx-unprivileged: the worker runs as a non-root user, which
# cannot bind ports <1024 — hence 8080 (compose/edge map to it explicitly).
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets; the bundle's JS/CSS shrink 50-80%.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Baseline security headers (duplicated in locations that set their own
    # add_header — nginx drops inherited headers there).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Cache static assets aggressively
    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }

    # Local health endpoint (used by Docker HEALTHCHECK)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

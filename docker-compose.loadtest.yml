# Isolated load-test stack — a throwaway copy of the app with its OWN database
# and object store, plus a Locust generator. Your real data is never reachable:
# this uses separate named volumes (loadtest_pgdata / loadtest_minio).
#
# Resource limits are env-driven so you can sweep "how many users at what
# server size". Defaults are modest; override per run, e.g.:
#   BACKEND_CPUS=2 BACKEND_MEM=2g PG_CPUS=2 PG_MEM=2g \
#     docker compose -f docker-compose.loadtest.yml up -d --build
#
# Typical workflow:
#   docker compose -f docker-compose.loadtest.yml up -d --build
#   docker compose -f docker-compose.loadtest.yml exec backend npx prisma migrate deploy
#   docker compose -f docker-compose.loadtest.yml exec backend \
#     npx ts-node prisma/seed-bigdata.ts seed --users 100 --projects 50 --tasks 20000
#   open http://localhost:8089          # Locust UI: set users + spawn rate, Start
#
# IMPORTANT: the limit measured here is the APP's, only if the generator isn't
# starving it. For real capacity numbers run Locust from a SEPARATE machine
# against the server URL (set TARGET_URL); on the same host treat results as a
# pessimistic floor.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
      POSTGRES_DB: tracker
    cpus: ${PG_CPUS:-1}
    mem_limit: ${PG_MEM:-1g}
    volumes:
      - loadtest_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - loadtest_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: warn
      CORS_ORIGINS: http://localhost:8088
      DATABASE_URL: postgresql://tracker:tracker@postgres:5432/tracker?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: loadtest_access_secret
      JWT_REFRESH_SECRET: loadtest_refresh_secret
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      # Rate limiting is effectively disabled: the whole generator is ONE IP, so
      # the per-IP limiter would throttle the test instead of the app. We want
      # to measure the app, not the throttler.
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 1000000
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      LOADTEST_PASSWORD: ${LOADTEST_PASSWORD:-loadtest1234}
    cpus: ${BACKEND_CPUS:-1}
    mem_limit: ${BACKEND_MEM:-1g}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "8080"

  edge:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    # Published so you can sanity-check the app in a browser during a run.
    ports:
      - "8088:80"
    volumes:
      - ./deploy/edge.conf:/etc/nginx/conf.d/default.conf:ro

  locust:
    build:
      context: ./loadtest
      dockerfile: Dockerfile
    depends_on:
      - edge
    environment:
      NUM_SEED_USERS: ${NUM_SEED_USERS:-100}
      LOADTEST_PASSWORD: ${LOADTEST_PASSWORD:-loadtest1234}
      REST_USER_WEIGHT: ${REST_USER_WEIGHT:-9}
      WS_USER_WEIGHT: ${WS_USER_WEIGHT:-1}
    # --host = the edge proxy, so the full nginx → backend path is measured.
    # The web UI (8089) is where you set users + spawn rate and watch live.
    command: >-
      -f /home/locust/locustfile.py
      --host ${TARGET_URL:-http://edge}
    ports:
      - "8089:8089"

volumes:
  loadtest_pgdata:
  loadtest_minio:

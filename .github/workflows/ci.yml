# CI — lint + tests for both backend and frontend.
# Runs on:
#   - pull requests targeting main or dev
#   - direct pushes to main and dev (gives green/red marker independent of dev-cd.yml)
#
# Always runs on GitHub-hosted ubuntu-latest (never on the self-hosted VM), so a
# malicious PR cannot reach the deploy machine. Fork PRs are governed by the
# repo's "Require approval for outside collaborators" setting.
name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tracker
          POSTGRES_PASSWORD: tracker
          POSTGRES_DB: tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tracker -d tracker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://tracker:tracker@localhost:5432/tracker_test?schema=public
      JWT_ACCESS_SECRET: ci_access
      JWT_REFRESH_SECRET: ci_refresh
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm test -- --runInBand
      - run: npm run build

  frontend:
    name: frontend (test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm test
      - run: npm run build

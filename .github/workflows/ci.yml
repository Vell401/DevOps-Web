# CI — lint + tests for both backend and frontend.
# Runs on:
#   - pull requests targeting main or dev (the merge gate)
#
# IMPORTANT: direct pushes to `dev` and `main` are NOT triggered here. Each
# deploy pipeline (dev-cd.yml for `dev`, prod-cd.yml for `main`) starts with its
# own test job, so running ci.yml on those pushes would duplicate the same work
# and waste runner minutes.
#
# Always runs on GitHub-hosted ubuntu-latest (never on a self-hosted VM), so a
# malicious pull request cannot reach a deploy machine. Fork pull requests are
# governed by the repository's "Require approval for outside collaborators"
# setting.
name: CI

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tracker
          POSTGRES_PASSWORD: tracker
          POSTGRES_DB: tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tracker -d tracker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://tracker:tracker@localhost:5432/tracker_test?schema=public
      JWT_ACCESS_SECRET: ci_access
      JWT_REFRESH_SECRET: ci_refresh
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm test -- --runInBand
      - run: npm run build

  frontend:
    name: frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

# Deploy — SSHes into the VPS, pulls the new images, runs migrations, restarts the stack.
# Triggered manually or after the "Release images" workflow finishes successfully.
#
# Required repository secrets:
#   VPS_HOST       — host or IP of the VPS
#   VPS_USER       — SSH user (e.g. deploy)
#   VPS_SSH_KEY    — private key (PEM) authorised on the VPS
#   VPS_DEPLOY_DIR — absolute path on the VPS where docker-compose.prod.yml + .env live
#
# Notes on triggers:
#   - main pushes auto-deploy the freshly-built `latest`.
#   - tag pushes (v*) intentionally do NOT auto-deploy. Trigger manually via
#     workflow_dispatch with image_tag=v1.2.3 to roll out a tagged release.
#     This gives you a manual gate for production-bound releases.
name: Deploy

on:
  workflow_run:
    workflows: ["Release images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. latest, sha-abc1234, v1.2.3)"
        default: latest
        required: true

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Decide tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_DEPLOY_DIR }}"

            # Pin the tag for this rollout
            export IMAGE_TAG="${{ steps.tag.outputs.value }}"
            echo "Deploying tag: $IMAGE_TAG"

            # Pull new images
            docker compose -f docker-compose.prod.yml --env-file .env pull

            # Apply migrations BEFORE swapping traffic
            docker compose -f docker-compose.prod.yml --env-file .env run --rm backend \
              npx prisma migrate deploy

            # Rolling restart
            docker compose -f docker-compose.prod.yml --env-file .env up -d

            # Wait for readiness
            for i in $(seq 1 30); do
              if curl -fsS http://localhost/api/health/ready >/dev/null; then
                echo "Backend is ready."
                exit 0
              fi
              echo "Waiting for backend... ($i/30)"
              sleep 2
            done
            echo "Backend failed readiness check"
            docker compose -f docker-compose.prod.yml --env-file .env logs --tail=200 backend
            exit 1

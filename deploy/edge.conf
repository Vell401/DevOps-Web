# Reverse proxy that fronts both backend and frontend.
# In production, you would typically put TLS termination (Let's Encrypt / Caddy / Traefik)
# in front of this, or extend this file with a TLS server block.

upstream backend_upstream {
    server backend:3000;
}

upstream frontend_upstream {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # Forward API traffic to the NestJS backend
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Everything else → SPA
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# Reverse proxy that fronts both backend and frontend.
# In production, you would typically put TLS termination (Let's Encrypt / Caddy / Traefik)
# in front of this, or extend this file with a TLS server block.

# Compress text responses (HTML/JS/CSS/JSON). Static assets shrink 50-80%;
# gzip_proxied makes this apply to upstream (proxied) responses too.
gzip on;
gzip_types text/plain text/css text/xml application/json application/javascript application/xml image/svg+xml;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;

upstream backend_upstream {
    server backend:3000;
}

upstream frontend_upstream {
    # nginx-unprivileged image: non-root nginx listens on 8080.
    server frontend:8080;
}

server {
    listen 80;
    server_name _;

    # Baseline security headers for every response. `always` keeps them on
    # error pages too. HSTS is intentionally absent — this stack serves plain
    # HTTP on a LAN and a cached HSTS pin would break it (see backend main.ts).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Edge's own liveness probe: answered by nginx directly (no upstream), so
    # the Docker healthcheck detects a wedged proxy, not a broken backend.
    location = /edge-healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Forward API traffic to the NestJS backend.
    # The Upgrade/Connection headers + long read timeout enable WebSocket
    # tunnelling for /api/socket.io (RealtimeGateway).
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        # Allow file uploads (task attachments) up to ~30 MB through the edge.
        # nginx defaults to 1 MB, which would reject anything larger with 413.
        client_max_body_size 30m;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # Everything else → SPA
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
